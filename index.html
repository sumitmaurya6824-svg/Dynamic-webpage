<!DOCTYPE html>
<html>
<head>
  <title>Dynamic Webpage</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 60px;
      background: #1a1a2e;
      color: white;
    }

    #box {
      background: #16213e;
      padding: 40px;
      margin: 30px auto;
      width: 380px;
      border-radius: 12px;
    }

    #emoji { font-size: 50px; }
    #title { font-size: 22px; margin: 10px 0; }
    #desc  { color: #aaa; }

    button {
      margin: 6px;
      padding: 10px 18px;
      font-size: 15px;
      cursor: pointer;
      border: none;
      background: #0f3460;
      color: white;
      border-radius: 8px;
    }

    button:hover { background: #e94560; }
  </style>
</head>
<body>

  <h1>Click & Discover</h1>

  <div id="box">
    <div id="emoji">👆</div>
    <h2 id="title">Pick a topic!</h2>
    <p id="desc">Click any button below to see content here.</p>
  </div>

  <button onclick="change('🌍', 'Geography', 'The Amazon River releases 20% of all fresh water into the ocean.')">Geography</button>
  <button onclick="change('🚀', 'Space', 'One day on Venus is longer than one year on Venus!')">Space</button>
  <button onclick="change('⚽', 'Sports', 'Football is the most watched sport with 4 billion fans worldwide.')">Sports</button>
  <button onclick="change('🧠', 'Science', 'Your brain uses 20% of your body\'s total energy.')">Science</button>

  <script>
    function change(emoji, title, desc) {
      document.getElementById('emoji').innerText = emoji;
      document.getElementById('title').innerText = title;
      document.getElementById('desc').innerText  = desc;
    }
  </script>

</body>
</html>
